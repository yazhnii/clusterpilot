<!DOCTYPE html>
<html>
<head>
  <title>ClusterPilot Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: white;
    }

    .container {
      padding: 30px;
      text-align: center;
    }

    h1 {
      margin-bottom: 30px;
    }

    .grid {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      width: 280px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .status {
      font-size: 20px;
      margin: 10px 0;
    }

    .green {
      color: #22c55e;
    }

    button {
      margin-top: 15px;
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    .data-box {
      margin-top: 10px;
      font-size: 14px;
      color: #cbd5f5;
      word-wrap: break-word;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🚀 ClusterPilot Dashboard</h1>

    <div class="grid">

      <!-- Status Card -->
      <div class="card">
        <h2>System Status</h2>
        <div class="status green" id="status">Checking...</div>
        <button onclick="checkStatus()">Refresh</button>
      </div>

      <!-- API Data Card -->
      <div class="card">
        <h2>API Data</h2>
        <button onclick="getData()">Fetch Data</button>
        <div class="data-box" id="data"></div>
      </div>

    </div>
  </div>

  <script>
    async function checkStatus() {
      document.getElementById("status").innerText = "Running 🟢";
    }

    async function getData() {
      const res = await fetch('/api/data');
      const data = await res.json();
      document.getElementById("data").innerText = JSON.stringify(data, null, 2);
    }

    // auto load
    checkStatus();
  </script>
</body>
</html>
